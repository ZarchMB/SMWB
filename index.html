<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Monthsary</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --dusty-rose: #c49b9b;
            --deep-rose: #a87878;
            --warm-ivory: #fdf5e6;
            --cream: #fef9f3;
            --soft-pink: #f5e0e0;
            --text-dark: #4a3030;
            --text-medium: #6b4545;
            --gold-accent: #c9a96e;
            --card-front: #fbf3ec;
            --card-back: #fffaf7;
            --shadow-soft: 0 4px 20px rgba(120, 80, 80, 0.12);
            --shadow-card: 0 6px 28px rgba(100, 60, 60, 0.15);
            --shadow-flipped: 0 8px 32px rgba(100, 60, 60, 0.2);
            --border-subtle: #e8d5d0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(170deg, #fef9f3 0%, #fdf5e6 30%, #f9ece8 60%, #fdf5e6 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Petal fall canvas */
        #petalCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.85;
        }

        /* Main container */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem 3rem;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeInDown 1s ease-out;
        }

        .header-subtitle {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--deep-rose);
            margin-bottom: 0.6rem;
            font-weight: 500;
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 4.5vw, 3rem);
            font-weight: 600;
            color: var(--text-dark);
            line-height: 1.2;
            letter-spacing: -0.01em;
        }

        .header-title .ampersand {
            font-style: italic;
            color: var(--deep-rose);
            font-weight: 500;
        }

        .header-ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 0.8rem;
        }

        .header-ornament .line {
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--dusty-rose), transparent);
        }

        .header-ornament .heart-icon {
            color: var(--deep-rose);
            font-size: 0.7rem;
            animation: pulseHeart 2s ease-in-out infinite;
        }

        /* Instruction */
        .instruction {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeIn 1.2s ease-out;
        }

        .instruction-text {
            display: inline-block;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            color: var(--text-medium);
            background: rgba(255, 255, 255, 0.5);
            padding: 0.5rem 1.4rem;
            border-radius: 50px;
            letter-spacing: 0.03em;
            border: 1px solid var(--border-subtle);
            backdrop-filter: blur(4px);
        }

        .instruction-text .arrow {
            display: inline-block;
            animation: gentleBounce 1.5s ease-in-out infinite;
            margin: 0 0.2rem;
        }

        /* Progress indicator */
        .progress-bar-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            margin-bottom: 2.2rem;
            flex-wrap: wrap;
            animation: fadeIn 1.4s ease-out;
        }

        .progress-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e5d0cc;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .progress-dot.revealed {
            background: var(--deep-rose);
            box-shadow: 0 0 8px rgba(168, 120, 120, 0.5);
            transform: scale(1.2);
        }

        .progress-dot.current {
            background: var(--dusty-rose);
            animation: pulseDot 1.8s ease-in-out infinite;
            box-shadow: 0 0 12px rgba(196, 155, 155, 0.6);
        }

        /* Cards grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.4rem;
            max-width: 950px;
            margin: 0 auto;
            perspective: 1200px;
        }

        /* Individual card wrapper */
        .card-wrapper {
            aspect-ratio: 3 / 4;
            perspective: 800px;
            cursor: pointer;
            position: relative;
            transition: transform 0.15s ease;
        }

        .card-wrapper:hover {
            transform: translateY(-3px);
        }

        .card-wrapper:active {
            transform: scale(0.97);
        }

        .card-wrapper.shaking {
            animation: shakeCard 0.5s ease;
            pointer-events: none;
        }

        .card-wrapper.flipped {
            cursor: default;
        }
        .card-wrapper.flipped:hover {
            transform: none;
        }
        .card-wrapper.flipped:active {
            transform: none;
        }

        /* The 3D card */
        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.4, 0.0, 0.2, 1);
            will-change: transform;
            border-radius: 16px;
        }

        .card-wrapper.flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* Card faces */
        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: box-shadow 0.5s ease;
        }

        /* Front face */
        .card-front {
            background: var(--card-front);
            border: 1.5px solid var(--border-subtle);
            z-index: 2;
        }

        .card-front::before {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 10px;
            border: 1px dashed rgba(196, 155, 155, 0.35);
            pointer-events: none;
            z-index: 1;
        }

        .card-front .heart-watermark {
            width: 55%;
            max-width: 100px;
            opacity: 0.28;
            transition: opacity 0.5s ease;
            z-index: 0;
            color: var(--deep-rose);
        }

        .card-front .heart-watermark svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .card-front .card-hint {
            position: absolute;
            bottom: 18%;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: rgba(107, 69, 69, 0.45);
            text-transform: uppercase;
            z-index: 1;
            transition: opacity 0.4s ease;
        }

        /* Subtle shimmer on front */
        .card-front::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg,
                    rgba(255, 255, 255, 0) 30%,
                    rgba(255, 255, 255, 0.25) 50%,
                    rgba(255, 255, 255, 0) 70%);
            border-radius: 16px;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card-wrapper:not(.flipped):hover .card-front::after {
            opacity: 1;
        }

        /* Back face */
        .card-back {
            background: var(--card-back);
            transform: rotateY(180deg);
            border: 1.5px solid var(--border-subtle);
            z-index: 1;
            padding: 0;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-flipped);
        }

        .card-back .number-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--deep-rose);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 600;
            z-index: 3;
            box-shadow: 0 2px 8px rgba(120, 70, 70, 0.3);
            letter-spacing: 0;
        }

        .card-back .image-area {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 55%;
        }

        .card-back .image-area .gradient-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            transition: opacity 0.5s ease;
        }

        .card-back .image-area img {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.4s ease;
        }

        .card-back .image-area .image-placeholder-icon {
            position: absolute;
            z-index: 0;
            font-size: 3rem;
            opacity: 0.5;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .card-back .message-area {
            padding: 0.8rem 1rem 1rem;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
            color: var(--text-medium);
            line-height: 1.4;
            font-style: italic;
            letter-spacing: 0.02em;
            flex-shrink: 0;
            min-height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Celebration overlay */
        .celebration-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .celebration-overlay.active {
            opacity: 1;
        }

        .celebration-message {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.6rem, 3vw, 2.6rem);
            color: var(--deep-rose);
            text-align: center;
            animation: celebratePop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 0 2px 20px rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.7);
            padding: 1.5rem 2.5rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(196, 155, 155, 0.3);
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes shakeCard {
            0%,
            100% {
                transform: translateX(0);
            }
            15% {
                transform: translateX(-7px) rotate(-1deg);
            }
            30% {
                transform: translateX(7px) rotate(1deg);
            }
            45% {
                transform: translateX(-5px) rotate(-0.5deg);
            }
            60% {
                transform: translateX(5px) rotate(0.5deg);
            }
            75% {
                transform: translateX(-2px);
            }
            90% {
                transform: translateX(2px);
            }
        }

        @keyframes pulseHeart {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.7;
            }
            50% {
                transform: scale(1.35);
                opacity: 1;
            }
        }

        @keyframes pulseDot {
            0%,
            100% {
                box-shadow: 0 0 8px rgba(196, 155, 155, 0.4);
            }
            50% {
                box-shadow: 0 0 18px rgba(196, 155, 155, 0.75);
            }
        }

        @keyframes gentleBounce {
            0%,
            100% {
                transform: translateX(0);
            }
            50% {
                transform: translateX(4px);
            }
        }

        @keyframes celebratePop {
            0% {
                transform: scale(0.6);
                opacity: 0;
            }
            60% {
                transform: scale(1.05);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes sparkleFloat {
            0%,
            100% {
                transform: translateY(0) scale(1);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            80% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-60px) scale(0.3);
                opacity: 0;
            }
        }

        /* Sparkles for celebration */
        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 998;
            font-size: 1.2rem;
            animation: sparkleFloat 2s ease-out forwards;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
                max-width: 420px;
            }

            .card-back .number-badge {
                width: 30px;
                height: 30px;
                font-size: 0.95rem;
                top: 8px;
                right: 8px;
            }

            .card-back .message-area {
                font-size: 0.75rem;
                padding: 0.6rem 0.7rem 0.8rem;
                min-height: 45px;
            }

            .card-back .image-area .image-placeholder-icon {
                font-size: 2.2rem;
            }

            .main-container {
                padding: 1.2rem 0.8rem 2rem;
            }

            .header-title {
                font-size: clamp(1.6rem, 6vw, 2.4rem);
            }

            .card-front .heart-watermark {
                width: 45%;
                max-width: 70px;
            }

            .card-front .card-hint {
                font-size: 0.6rem;
                bottom: 14%;
            }
        }

        @media (max-width: 380px) {
            .cards-grid {
                gap: 0.7rem;
                max-width: 340px;
            }

            .card-back .number-badge {
                width: 26px;
                height: 26px;
                font-size: 0.8rem;
                top: 6px;
                right: 6px;
            }

            .card-back .message-area {
                font-size: 0.7rem;
                padding: 0.5rem 0.5rem 0.6rem;
                min-height: 38px;
            }

            .card-back .image-area .image-placeholder-icon {
                font-size: 1.8rem;
            }

            .header-title {
                font-size: 1.4rem;
            }
        }

        @media (min-width: 1200px) {
            .cards-grid {
                gap: 1.8rem;
                max-width: 1000px;
            }
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            .card-inner {
                transition: transform 0.3s ease;
            }
            .card-wrapper.shaking {
                animation: shakeCard 0.3s ease;
            }
            #petalCanvas {
                display: none;
            }
            .header-ornament .heart-icon {
                animation: none;
            }
            .progress-dot.current {
                animation: none;
            }
        }
    </style>
</head>
<body>

    <!-- Petal Canvas -->
    <canvas id="petalCanvas" aria-hidden="true"></canvas>

    <!-- Celebration Overlay -->
    <div class="celebration-overlay" id="celebrationOverlay">
        <div class="celebration-message">💕 Forever & Always, My Babi 💕</div>
    </div>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Header -->
        <header class="header">
            <p class="header-subtitle">✨ 8 Months Together ✨</p>
            <h1 class="header-title">
                Happy Second<br>Monthsary My <span class="ampersand">Babi</span>
            </h1>
            <div class="header-ornament">
                <span class="line"></span>
                <span class="heart-icon">♥</span>
                <span class="line"></span>
            </div>
        </header>

        <!-- Instruction -->
        <div class="instruction" id="instruction">
            <span class="instruction-text">
                <span class="arrow">👉</span> Tap the cards in order to unlock our memories
                <span class="arrow">👈</span>
            </span>
        </div>

        <!-- Progress Dots -->
        <div class="progress-bar-container" id="progressBar"></div>

        <!-- Cards Grid -->
        <div class="cards-grid" id="cardsGrid"></div>
    </main>

    <script>
        (function() {
            
            const cardData = [{
                id: 1,
                gradient: 'linear-gradient(135deg, #f8e4e0 0%, #f0cec8 40%, #e8bdb5 100%)',
                placeholderEmoji: '🌙',
                message: 'The night I first saw you — my heart knew it found its home.',
                imageUrl: './images/mem1.jpg',
            }, {
                id: 2,
                gradient: 'linear-gradient(135deg, #f5e0d5 0%, #edcfc0 40%, #e2bfad 100%)',
                placeholderEmoji: '🌸',
                message: 'Our first month together — every second was pure magic.',
                imageUrl: './images/mem2.jpg',
            }, {
                id: 3,
                gradient: 'linear-gradient(135deg, #f0d8e0 0%, #e6c5d0 40%, #dbb5c0 100%)',
                placeholderEmoji: '💫',
                message: 'The way you smile lights up even my darkest days.',
                imageUrl: './images/mem3.jpg',
            }, {
                id: 4,
                gradient: 'linear-gradient(135deg, #f8efe5 0%, #efe0d2 40%, #e5d2c0 100%)',
                placeholderEmoji: '🌅',
                message: 'Every date with you becomes my most treasured memory.',
                imageUrl: './images/mem4.jpg',
            }, {
                id: 5,
                gradient: 'linear-gradient(135deg, #f0e0d8 0%, #e5d0c5 40%, #dac0b2 100%)',
                placeholderEmoji: '🦋',
                message: 'Falling deeper in love with you, day after day.',
                imageUrl: './images/mem5.jpg',
            }, {
                id: 6,
                gradient: 'linear-gradient(135deg, #f8e8f0 0%, #eed5e2 40%, #e2c5d4 100%)',
                placeholderEmoji: '✨',
                message: 'You turn ordinary moments into extraordinary ones.',
                imageUrl: './images/mem6.jpg',
            }, {
                id: 7,
                gradient: 'linear-gradient(135deg, #f5e5e0 0%, #ead5ce 40%, #dec5bc 100%)',
                placeholderEmoji: '🌙',
                message: 'Seven months of loving you — and it only gets better.',
                imageUrl: './images/mem7.jpg',
            }, {
                id: 8,
                gradient: 'linear-gradient(135deg, #f0d5d8 0%, #e3c0c5 40%, #d5acb2 100%)',
                placeholderEmoji: '♾️',
                message: 'Here\'s to forever with you, my love, my everything.',
                imageUrl: './images/mem8.jpg',
            }, ];

            // ─────────────────────────────────────
            // STATE
            // ─────────────────────────────────────
            let nextCardToFlip = 1; // 1-based (matches card id)
            const flippedCards = new Set();
            let isAnimating = false;
            let allFlipped = false;

            // ─────────────────────────────────────
            // DOM ELEMENTS
            // ─────────────────────────────────────
            const cardsGrid = document.getElementById('cardsGrid');
            const progressBar = document.getElementById('progressBar');
            const instruction = document.getElementById('instruction');
            const celebrationOverlay = document.getElementById('celebrationOverlay');

            // ─────────────────────────────────────
            // HAND-DRAWN HEART SVG
            // ─────────────────────────────────────
            function getHeartSVG() {
                return `
                <svg viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M60 95 
                           C28 72 8 56 8 40 
                           C8 25 18 14 32 14 
                           C40 14 48 19 60 32 
                           C72 19 80 14 88 14 
                           C102 14 112 25 112 40 
                           C112 56 92 72 60 95Z" />
                </svg>`;
            }

            // ─────────────────────────────────────
            // BUILD PROGRESS DOTS
            // ─────────────────────────────────────
            function buildProgressDots() {
                progressBar.innerHTML = '';
                for (let i = 1; i <= 8; i++) {
                    const dot = document.createElement('span');
                    dot.className = 'progress-dot';
                    dot.dataset.cardId = i;
                    if (flippedCards.has(i)) {
                        dot.classList.add('revealed');
                    }
                    if (i === nextCardToFlip && !flippedCards.has(i)) {
                        dot.classList.add('current');
                    }
                    progressBar.appendChild(dot);
                }
            }

            function updateProgressDots() {
                const dots = progressBar.querySelectorAll('.progress-dot');
                dots.forEach(dot => {
                    const id = parseInt(dot.dataset.cardId);
                    dot.classList.remove('revealed', 'current');
                    if (flippedCards.has(id)) {
                        dot.classList.add('revealed');
                    } else if (id === nextCardToFlip) {
                        dot.classList.add('current');
                    }
                });
            }

            // ─────────────────────────────────────
            // BUILD CARDS
            // ─────────────────────────────────────
            function buildCards() {
                cardsGrid.innerHTML = '';
                cardData.forEach((data) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'card-wrapper';
                    wrapper.dataset.cardId = data.id;
                    wrapper.setAttribute('role', 'button');
                    wrapper.setAttribute('aria-label', `Card ${data.id} - Tap to reveal`);
                    wrapper.setAttribute('tabindex', '0');

                    const inner = document.createElement('div');
                    inner.className = 'card-inner';

                    // Front face
                    const front = document.createElement('div');
                    front.className = 'card-face card-front';
                    const heartDiv = document.createElement('div');
                    heartDiv.className = 'heart-watermark';
                    heartDiv.innerHTML = getHeartSVG();
                    front.appendChild(heartDiv);
                    const hint = document.createElement('span');
                    hint.className = 'card-hint';
                    hint.textContent = 'Tap me';
                    front.appendChild(hint);

                    // Back face
                    const back = document.createElement('div');
                    back.className = 'card-face card-back';

                    const badge = document.createElement('div');
                    badge.className = 'number-badge';
                    badge.textContent = data.id;

                    const imageArea = document.createElement('div');
                    imageArea.className = 'image-area';

                    const gradientBg = document.createElement('div');
                    gradientBg.className = 'gradient-bg';
                    gradientBg.style.background = data.gradient;

                    const placeholderIcon = document.createElement('span');
                    placeholderIcon.className = 'image-placeholder-icon';
                    placeholderIcon.textContent = data.placeholderEmoji;

                    imageArea.appendChild(gradientBg);
                    imageArea.appendChild(placeholderIcon);

                    // If there's an image URL, add an img tag
                    if (data.imageUrl) {
                        const img = document.createElement('img');
                        img.src = data.imageUrl;
                        img.alt = `Memory ${data.id}`;
                        img.loading = 'lazy';
                        img.onerror = function() {
                            this.style.display = 'none';
                            placeholderIcon.style.opacity = '0.5';
                        };
                        img.onload = function() {
                            placeholderIcon.style.opacity = '0';
                            gradientBg.style.opacity = '0.3';
                        };
                        imageArea.appendChild(img);
                    }

                    const messageArea = document.createElement('div');
                    messageArea.className = 'message-area';
                    messageArea.textContent = `"${data.message}"`;

                    back.appendChild(badge);
                    back.appendChild(imageArea);
                    back.appendChild(messageArea);

                    inner.appendChild(front);
                    inner.appendChild(back);
                    wrapper.appendChild(inner);

                    // Click handler
                    wrapper.addEventListener('click', () => handleCardClick(wrapper, data.id));
                    wrapper.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            handleCardClick(wrapper, data.id);
                        }
                    });

                    cardsGrid.appendChild(wrapper);
                });
            }

            // ─────────────────────────────────────
            // HANDLE CARD CLICK
            // ─────────────────────────────────────
            function handleCardClick(wrapper, cardId) {
                if (isAnimating) return;
                if (flippedCards.has(cardId)) return; // Already flipped
                if (allFlipped) return;

                if (cardId === nextCardToFlip) {
                    // Correct card!
                    flipCard(wrapper, cardId);
                } else if (cardId > nextCardToFlip) {
                    // Wrong card – shake it
                    shakeCard(wrapper);
                }
                // If cardId < nextCardToFlip, it's already flipped (handled above)
            }

            function flipCard(wrapper, cardId) {
                isAnimating = true;
                flippedCards.add(cardId);
                wrapper.classList.add('flipped');
                wrapper.setAttribute('aria-label', `Card ${cardId} - Revealed`);

                // Update progress
                updateProgressDots();

                // Update instruction
                if (nextCardToFlip <= 8) {
                    nextCardToFlip++;
                }

                // Update the "current" dot
                updateProgressDots();

                // Check if all flipped
                if (flippedCards.size === 8) {
                    allFlipped = true;
                    setTimeout(() => {
                        triggerCelebration();
                    }, 800);
                    if (instruction) {
                        instruction.querySelector('.instruction-text').textContent =
                            '💖 All our memories together — I cherish every one 💖';
                    }
                } else if (nextCardToFlip <= 8) {
                    if (instruction) {
                        instruction.querySelector('.instruction-text').innerHTML =
                            `<span class="arrow">👉</span> Next, Tap Card #${nextCardToFlip} <span class="arrow">👈</span>`;
                    }
                }

                // Release animation lock after transition
                setTimeout(() => {
                    isAnimating = false;
                }, 750);
            }

            function shakeCard(wrapper) {
                if (isAnimating) return;
                isAnimating = true;
                wrapper.classList.add('shaking');

                // Brief haptic-like visual pulse on the correct next card
                const allWrappers = cardsGrid.querySelectorAll('.card-wrapper');
                allWrappers.forEach(w => {
                    const id = parseInt(w.dataset.cardId);
                    if (id === nextCardToFlip && !flippedCards.has(id)) {
                        w.style.boxShadow = '0 0 0 4px rgba(196, 155, 155, 0.5)';
                        setTimeout(() => {
                            w.style.boxShadow = '';
                        }, 600);
                    }
                });

                setTimeout(() => {
                    wrapper.classList.remove('shaking');
                    isAnimating = false;
                }, 500);
            }

            // ─────────────────────────────────────
            // CELEBRATION
            // ─────────────────────────────────────
            function triggerCelebration() {
                celebrationOverlay.classList.add('active');
                spawnSparkles();

                setTimeout(() => {
                    celebrationOverlay.classList.remove('active');
                }, 4000);
            }

            function spawnSparkles() {
                const emojis = ['💕', '✨', '💖', '🌟', '💗', '🦋', '🌸', '💫', '♥️', '💝'];
                const body = document.body;

                for (let i = 0; i < 30; i++) {
                    setTimeout(() => {
                        const sparkle = document.createElement('span');
                        sparkle.className = 'sparkle';
                        sparkle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                        sparkle.style.left = Math.random() * 90 + '%';
                        sparkle.style.top = Math.random() * 80 + '%';
                        sparkle.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
                        sparkle.style.fontSize = (0.8 + Math.random() * 1.8) + 'rem';
                        body.appendChild(sparkle);

                        setTimeout(() => {
                            sparkle.remove();
                        }, 3000);
                    }, i * 60);
                }
            }

            // ─────────────────────────────────────
            // PETAL FALL ANIMATION (Canvas)
            // ─────────────────────────────────────
            function initPetals() {
                const canvas = document.getElementById('petalCanvas');
                const ctx = canvas.getContext('2d');
                let width = canvas.width = window.innerWidth;
                let height = canvas.height = window.innerHeight;

                const petals = [];
                const maxPetals = 22;
                let animationId;
                let settleTimer;
                let isSettling = false;
                const settleDelay = 5000; // Start settling after 5 seconds

                // Petal class
                class Petal {
                    constructor(startY = null) {
                        this.reset(startY);
                    }

                    reset(startY = null) {
                        this.x = Math.random() * width;
                        this.y = startY !== null ? startY : -40 - Math.random() * 200;
                        this.size = 8 + Math.random() * 16;
                        this.rotation = Math.random() * Math.PI * 2;
                        this.rotationSpeed = (Math.random() - 0.5) * 0.03;
                        this.swaySpeed = 0.4 + Math.random() * 0.8;
                        this.swayAmount = 15 + Math.random() * 40;
                        this.fallSpeed = 0.6 + Math.random() * 1.6;
                        this.opacity = 0.35 + Math.random() * 0.45;
                        this.color = Math.random() < 0.5 ?
                            `rgba(210,150,150,${this.opacity})` :
                            `rgba(225,175,170,${this.opacity})`;
                        this.startX = this.x;
                        this.time = Math.random() * Math.PI * 2;
                    }

                    update() {
                        this.time += 0.012;
                        this.y += this.fallSpeed;
                        this.x = this.startX + Math.sin(this.time * this.swaySpeed) * this.swayAmount;
                        this.rotation += this.rotationSpeed;

                        if (this.y > height + 60) {
                            if (isSettling) {
                                return false; // Remove petal
                            }
                            this.reset(-40 - Math.random() * 60);
                        }
                        return true;
                    }

                    draw(ctx) {
                        ctx.save();
                        ctx.translate(this.x, this.y);
                        ctx.rotate(this.rotation);
                        ctx.globalAlpha = isSettling ? Math.max(0, this.opacity * (1 - (this.y / (height +
                            60)))) : this.opacity;
                        ctx.fillStyle = this.color;
                        ctx.beginPath();
                        // Teardrop/petal shape
                        const s = this.size;
                        ctx.moveTo(0, -s * 0.7);
                        ctx.bezierCurveTo(s * 0.5, -s * 0.3, s * 0.5, s * 0.3, 0, s * 0.7);
                        ctx.bezierCurveTo(-s * 0.5, s * 0.3, -s * 0.5, -s * 0.3, 0, -s * 0.7);
                        ctx.fill();
                        ctx.restore();
                    }
                }

                // Create petals
                for (let i = 0; i < maxPetals; i++) {
                    petals.push(new Petal(-Math.random() * height * 0.7));
                }

                function animate() {
                    ctx.clearRect(0, 0, width, height);

                    let allGone = true;
                    for (const petal of petals) {
                        const alive = petal.update();
                        if (alive) {
                            petal.draw(ctx);
                            allGone = false;
                        }
                    }

                    if (isSettling && allGone) {
                        // All petals have fallen off screen
                        cancelAnimationFrame(animationId);
                        return;
                    }

                    animationId = requestAnimationFrame(animate);
                }

                // Start animation
                animate();

                // Begin settling after delay
                settleTimer = setTimeout(() => {
                    isSettling = true;
                    // After settling, fade canvas
                    setTimeout(() => {
                        canvas.style.transition = 'opacity 1.5s ease';
                        canvas.style.opacity = '0';
                        setTimeout(() => {
                            cancelAnimationFrame(animationId);
                            canvas.remove();
                        }, 1600);
                    }, 3000);
                }, settleDelay);

                // Handle resize
                window.addEventListener('resize', () => {
                    width = canvas.width = window.innerWidth;
                    height = canvas.height = window.innerHeight;
                });

                // Store for cleanup
                canvas._cleanup = () => {
                    clearTimeout(settleTimer);
                    cancelAnimationFrame(animationId);
                };
            }

            // ─────────────────────────────────────
            // INITIALIZE
            // ─────────────────────────────────────
            function init() {
                buildProgressDots();
                buildCards();
                updateProgressDots();
                initPetals();

                // Set initial instruction
                if (instruction) {
                    instruction.querySelector('.instruction-text').innerHTML =
                        `<span class="arrow">👉</span> Tap the cards in order to unlock our memories <span class="arrow">👈</span>`;
                }
            }

            // ─────────────────────────────────────
            // START
            // ─────────────────────────────────────
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            // ─────────────────────────────────────
            // EXPORT FOR DEBUGGING
            // ─────────────────────────────────────
            window._monthsaryState = {
                getNextCard: () => nextCardToFlip,
                getFlipped: () => flippedCards,
                getAllFlipped: () => allFlipped,
                reset: () => {
                    nextCardToFlip = 1;
                    flippedCards.clear();
                    allFlipped = false;
                    isAnimating = false;
                    buildProgressDots();
                    buildCards();
                    updateProgressDots();
                    celebrationOverlay.classList.remove('active');
                    if (instruction) {
                        instruction.querySelector('.instruction-text').innerHTML =
                            `<span class="arrow">👉</span> Tap the cards in order to unlock our memories <span class="arrow">👈</span>`;
                    }
                },
            };

            console.log('💕 Second Monthsary with My Babi — Ready!');
            console.log('   Tap the cards in order from 1 to 8.');
            console.log('   To customize images, update the cardData array.');
            console.log('   window._monthsaryState.reset() to restart.');
        })();
    </script>
</body>
